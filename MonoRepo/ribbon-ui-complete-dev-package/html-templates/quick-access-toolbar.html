<!-- Quick Access Toolbar -->

<div class="ribbon-quick-access-toolbar ribbon-qat--titlebar">
  <div class="ribbon-qat_buttons">
    <!-- Save Button -->
    <button class="ribbon-qat_button" id="qat-save" title="Save (Ctrl+S)" aria-label="Save">
      <span class="ribbon-qat_button_icon">💾</span>
      <span class="ribbon-qat_button_label">Save</span>
    </button>

    <!-- Undo Button -->
    <button class="ribbon-qat_button" id="qat-undo" title="Undo (Ctrl+Z)" aria-label="Undo">
      <span class="ribbon-qat_button_icon">↶</span>
      <span class="ribbon-qat_button_label">Undo</span>
    </button>

    <!-- Redo Button -->
    <button class="ribbon-qat_button" id="qat-redo" title="Redo (Ctrl+Y)" aria-label="Redo">
      <span class="ribbon-qat_button_icon">↷</span>
      <span class="ribbon-qat_button_label">Redo</span>
    </button>

    <!-- Divider -->
    <div class="ribbon-qat_separator"></div>

    <!-- Print Button -->
    <button class="ribbon-qat_button" id="qat-print" title="Print (Ctrl+P)" aria-label="Print">
      <span class="ribbon-qat_button_icon">🖨️</span>
      <span class="ribbon-qat_button_label">Print</span>
    </button>

    <!-- Customize Button -->
    <button class="ribbon-qat_button ribbon-qat_button--customize" id="qat-customize" title="Customize Quick Access Toolbar" aria-label="Customize">
      <span class="ribbon-qat_button_icon">⋮</span>
    </button>
  </div>

  <!-- Customize Menu (hidden by default) -->
  <div class="ribbon-qat_customize-menu" id="qat-customize-menu">
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" checked />
      <span>Save</span>
    </label>
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" checked />
      <span>Undo</span>
    </label>
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" checked />
      <span>Redo</span>
    </label>
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" checked />
      <span>Print</span>
    </label>
    <hr />
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" />
      <span>Print Preview</span>
    </label>
    <label class="ribbon-qat_customize-item">
      <input type="checkbox" />
      <span>Open</span>
    </label>
    <hr />
    <button class="ribbon-qat_customize-item ribbon-qat_customize-item--text">More Commands...</button>
    <button class="ribbon-qat_customize-item ribbon-qat_customize-item--text">Show Below Ribbon</button>
    <button class="ribbon-qat_customize-item ribbon-qat_customize-item--text">Reset</button>
  </div>
</div>
