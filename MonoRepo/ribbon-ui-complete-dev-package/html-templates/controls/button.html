<!-- Button Control -->

<button class="ribbon-button">Button</button>

  <span class="ribbon-button_icon">💾</span>

</button>

</button>

<!-- Small Button -->
<button class="ribbon-button ribbon-button--small">Small</button>

<!-- Large Button -->
<button class="ribbon-button ribbon-button--large">Large</button>
